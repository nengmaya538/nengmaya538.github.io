    <!-- ============================================ -->
    <!-- SEO OTOMATIS - JALAN SEBELUM RENDER          -->
    <!-- ============================================ -->
    <script>
    /*
     * SEO script ini membaca hostname utuh dan query,
     * lalu mengisi title, meta description, meta author,
     * canonical, dan schema.org sebelum halaman dirender.
     * Crawler yang tidak menjalankan JS tetap bisa
     * membaca metadata awal.
     */
    (function() {
        var hostname = location.hostname;
        var urlParams = new URLSearchParams(location.search);
        var query = urlParams.get("q");

        /*
         * Ambil hostname utuh tanpa TLD.
         * Contoh:
         *   abc.domain01.com        → abc-domain01
         *   beatleakedflow.my.id    → beatleakedflow
         *   sub.freehtmlparser.io   → sub-freehtmlparser
         */
        var parts = hostname.split(".");
        var tldParts = 2; // asumsi TLD 2 level: my.id, github.io, pages.dev, co.id, com, net, dll
        var rawName = parts.slice(0, Math.max(1, parts.length - tldParts)).join("-");
        if (rawName.toLowerCase() === "www") {
            rawName = parts.slice(1, Math.max(2, parts.length - tldParts)).join("-");
        }
        var fullName = rawName;

        var displayDomain = fullName;

        var titleText = "";
        var descText = "";

        if (query) {
            query = decodeURIComponent(query.replace(/\+/g, " "));
            titleText = query + " on " + displayDomain;
            descText = query + " - Complete archive on " + displayDomain + ". Latest updates and exclusive content.";
        } else {
            titleText = displayDomain;
            descText = displayDomain + " - Latest updates and exclusive content.";
        }

        document.title = titleText;
        var titleTag = document.getElementById("dynamic-title");
        if (titleTag) titleTag.textContent = titleText;

        var metaDesc = document.getElementById("dynamic-description");
        if (metaDesc) metaDesc.setAttribute("content", descText);

        var metaAuthor = document.getElementById("dynamic-author");
        if (metaAuthor) metaAuthor.setAttribute("content", displayDomain);

        var canonicalLink = document.getElementById("dynamic-canonical");
        if (canonicalLink) {
            canonicalLink.setAttribute("href", location.href);
        }

        var schemaData = {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": displayDomain,
            "url": location.origin
        };
        var schemaScript = document.createElement("script");
        schemaScript.type = "application/ld+json";
        schemaScript.textContent = JSON.stringify(schemaData);
        document.head.appendChild(schemaScript);
    })();
    </script>

            .forum-container { padding: 0.5rem; }
            .sidebar-card { position: static; }

        }

        @media (max-width: 480px) {

        }
    </style>

<script>
(function() {

    /*
     * ============================================
     * STEP 1: AMBIL FULL HOSTNAME SEBAGAI DNA
     * ============================================
     * Hostname utuh tanpa TLD menjadi identitas.
     * Contoh:
     *   abc.domain01.com        → abc-domain01
     *   abc.domain02.com        → abc-domain02 (BEDA)
     *   beatleakedflow.my.id    → beatleakedflow
     *   sub.beatleakedflow.my.id → sub-beatleakedflow
     *   freehtmlparser.github.io → freehtmlparser
     */

    var hostname = window.location.hostname;
    var parts = hostname.split(".");
    var tldParts = 2;
    var rawName = parts.slice(0, Math.max(1, parts.length - tldParts)).join("-");
    if (rawName.toLowerCase() === "www") {
        rawName = parts.slice(1, Math.max(2, parts.length - tldParts)).join("-");
    }
    var fullName = rawName;

    /*
     * ============================================
     * STEP 2: HASH FUNCTION (DETERMINISTIK)
     * ============================================
     */
    function hashString(str) {
        var hash = 0;
        for (var i = 0; i < str.length; i++) {
            hash = ((hash << 5) - hash) + str.charCodeAt(i);
            hash |= 0;
        }
        return Math.abs(hash);
    }

    var domainHash = hashString(fullName);

    /*
     * ============================================
     * STEP 3: DETEKSI QUERY
     * ============================================
     */
    var urlParams = new URLSearchParams(window.location.search);
    var query = urlParams.get("q");
    var queryPage = document.getElementById("query-page");

    if (!query) {
        if (queryPage) queryPage.style.display = "none";
        return;
    }

    if (queryPage) queryPage.style.display = "block";
    query = decodeURIComponent(query.replace(/\+/g, " "));

    /*
     * ============================================
     * STEP 4: COMBINED SEED (DOMAIN + QUERY)
     * ============================================
     */
    var combinedSeed = hashString(fullName + "|||" + query);

    /*
     * ============================================
     * STEP 5: SEEDED RANDOM & UTILS
     * ============================================
     */
    function SeededRandom(seed) {
        this.seed = seed;
        this.next = function() {
            this.seed = (this.seed * 1103515245 + 12345) & 0x7fffffff;
            return this.seed / 0x7fffffff;
        };
    }

    function pickFromArray(arr, seed, index) {
        return arr[(seed + index) % arr.length];
    }

    function shuffleArray(arr, seed) {
        var shuffled = arr.slice();
        var rng = new SeededRandom(seed);
        for (var i = shuffled.length - 1; i > 0; i--) {
            var j = Math.floor(rng.next() * (i + 1));
            var temp = shuffled[i];
            shuffled[i] = shuffled[j];
            shuffled[j] = temp;
        }
        return shuffled;
    }

    /*
     * ============================================
     * STEP 6: GENERATE WARNA DARI HASH DOMAIN
     * ============================================
     */
    var hue = domainHash % 360;

    function hslToHex(h, s, l) {
        h = h % 360;
        s = s / 100;
        l = l / 100;
        var c = (1 - Math.abs(2 * l - 1)) * s;
        var x = c * (1 - Math.abs((h / 60) % 2 - 1));
        var m = l - c / 2;
        var r, g, b;
        if (h < 60) { r = c; g = x; b = 0; }
        else if (h < 120) { r = x; g = c; b = 0; }
        else if (h < 180) { r = 0; g = c; b = x; }
        else if (h < 240) { r = 0; g = x; b = c; }
        else if (h < 300) { r = x; g = 0; b = c; }
        else { r = c; g = 0; b = x; }
        r = Math.round((r + m) * 255);
        g = Math.round((g + m) * 255);
        b = Math.round((b + m) * 255);
        return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
    }

    var accentColor = hslToHex(hue, 70, 50);
    var accentHover = hslToHex(hue, 80, 60);
    var flairBg1 = hslToHex(hue, 30, 15);
    var flairText1 = hslToHex(hue, 60, 75);
    var flairBg2 = hslToHex((hue + 60) % 360, 30, 15);
    var flairText2 = hslToHex((hue + 60) % 360, 60, 75);
    var flairBg3 = hslToHex((hue + 120) % 360, 30, 15);
    var flairText3 = hslToHex((hue + 120) % 360, 60, 75);
    var flairBg4 = hslToHex((hue + 180) % 360, 30, 15);
    var flairText4 = hslToHex((hue + 180) % 360, 60, 75);
    var flairBg5 = hslToHex((hue + 240) % 360, 30, 15);
    var flairText5 = hslToHex((hue + 240) % 360, 60, 75);

    var styleEl = document.createElement("style");
    styleEl.textContent = ":root {" +
        "--accent: " + accentColor + ";" +
        "--accent-hover: " + accentHover + ";" +
        "--flair-bg-1: " + flairBg1 + ";" +
        "--flair-text-1: " + flairText1 + ";" +
        "--flair-bg-2: " + flairBg2 + ";" +
        "--flair-text-2: " + flairText2 + ";" +
        "--flair-bg-3: " + flairBg3 + ";" +
        "--flair-text-3: " + flairText3 + ";" +
        "--flair-bg-4: " + flairBg4 + ";" +
        "--flair-text-4: " + flairText4 + ";" +
        "--flair-bg-5: " + flairBg5 + ";" +
        "--flair-text-5: " + flairText5 + ";" +
        "}";
    document.head.appendChild(styleEl);

    /*
     * ============================================
     * STEP 7: LAYOUT DARI HASH DOMAIN
     * ============================================
     */
    var layoutIndex = domainHash % 3;
    var layoutClasses = ["feed-list", "grid", "gallery"];
    var layoutClass = layoutClasses[layoutIndex];

    /*
     * ============================================
     * STEP 8: GENERATE FLAIR POOL DARI NAMA DOMAIN
     * ============================================
     */
    function generateFlairPool(name, count) {
        var chars = name.toUpperCase().replace(/[^A-Z]/g, "");
        if (chars.length < 3) chars = name.toUpperCase() + "XYZ";
        var pool = [];
        var rng = new SeededRandom(hashString(name + "_flair"));
        for (var i = 0; i < count; i++) {
            var flair = "";
            var len = 3 + Math.floor(rng.next() * 6);
            for (var j = 0; j < len; j++) {
                flair += chars.charAt(Math.floor(rng.next() * chars.length));
            }
            pool.push(flair);
        }
        return pool;
    }

    var flairPool = generateFlairPool(fullName, 20);

    /*
     * ============================================
     * STEP 9: POOL TEMPLATE (DI-SHUFFLE PER DOMAIN)
     * ============================================
     */

    var titleTemplates = shuffleArray([
        "[QUERY] Archive on [DOMAIN]",
        "[QUERY] - Full Collection | [DOMAIN]",
        "[DOMAIN] presents: [QUERY]",
        "[QUERY] - Latest Updates on [DOMAIN]",
        "Access [QUERY] on [DOMAIN]",
        "[DOMAIN] - [QUERY] Complete Archive",
        "[QUERY] Collection - [DOMAIN]",
        "Browse [QUERY] on [DOMAIN]"
    ], domainHash);

    var h2Templates = shuffleArray([
        "[DOMAIN] - [QUERY] Archive",
        "Search Results: [QUERY] - [DOMAIN]",
        "[QUERY] - [DOMAIN] Collection",
        "[DOMAIN] - Latest [QUERY] Content",
        "[QUERY] Updates - [DOMAIN]"
    ], domainHash);

    var sidebarTitles = shuffleArray([
        "More on [DOMAIN]",
        "Related Content",
        "You May Also Like",
        "Trending on [DOMAIN]",
        "Popular Picks",
        "[DOMAIN] Recommends"
    ], domainHash);

    var footerTexts = shuffleArray([
        "[DOMAIN] - Independent archive",
        "[DOMAIN] - Community driven",
        "[DOMAIN] - Live updates",
        "[DOMAIN] - Updated regularly",
        "[DOMAIN] - Verified source"
    ], domainHash);

    var footerStatuses = shuffleArray([
        "live", "active", "online", "updated", "available"
    ], domainHash);

    var sortLabels = shuffleArray([
        "Relevance", "Trending", "Hot", "Top Rated", "Most Viewed"
    ], domainHash);

    var headerActionLabels = shuffleArray([
        "JOIN", "FOLLOW", "SUBSCRIBE", "ACCESS", "ENTER", "BROWSE"
    ], domainHash);

    var timePhrases = shuffleArray([
        "just now", "a few minutes ago", "recently",
        "earlier today", "today", "not long ago",
        "fresh", "new", "latest", "just added",
        "updated", "active now"
    ], domainHash);

    var authorPrefixes = shuffleArray([
        "user", "member", "contributor", "curator",
        "collector", "source", "uploader"
    ], domainHash);

    var actionVerbSets = shuffleArray([
        ["comments", "Share", "Save"],
        ["replies", "Share", "Bookmark"],
        ["discussions", "Copy link", "Save"],
        ["responses", "Share", "Pin"]
    ], domainHash);

    /*
     * ============================================
     * STEP 10: EKSTRAK DISPLAY NAME DARI QUERY
     * ============================================
     */
    var removeTerms = [
        "leaked", "leak", "leaks", "archive", "collection", "dump",
        "vault", "pack", "bundle", "gallery", "content", "media",
        "videos", "photos", "pics", "onlyfans", "tiktok", "instagram",
        "twitter", "telegram", "discord", "trending", "viral",
        "exclusive", "private", "premium", "full", "complete",
        "hot", "new", "watch", "view", "access", "reddit", "forum", "thread"
    ];
    var baseRaw = query.toLowerCase();
    removeTerms.forEach(function(term) {
        var regex = new RegExp("\\b" + term + "\\b", "gi");
        baseRaw = baseRaw.replace(regex, "");
    });
    baseRaw = baseRaw.replace(/\s+/g, " ").trim();
    var baseName = baseRaw || query;
    if (baseName.length < 2) baseName = query;

    function formatName(str) {
        return str.split(" ").map(function(w) {
            return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
        }).join(" ");
    }
    var displayName = formatName(baseName);
    var displayLower = displayName.toLowerCase();

    /*
     * ============================================
     * STEP 11: UPDATE ELEMEN HALAMAN
     * ============================================
     */

    // H1
    var h1Text = pickFromArray(titleTemplates, combinedSeed, 0)
        .replace("[QUERY]", displayName)
        .replace("[DOMAIN]", fullName);
    document.getElementById("page-h1").innerText = h1Text;

    // Breadcrumb
    document.getElementById("breadcrumb-domain").innerText = fullName;
    document.getElementById("breadcrumb-query").innerText = displayName;

    // Header card
    var h2Text = pickFromArray(h2Templates, combinedSeed, 1)
        .replace("[QUERY]", displayName)
        .replace("[DOMAIN]", fullName);
    document.getElementById("header-title").innerText = h2Text;
    document.getElementById("header-subtitle").innerText =
        "Showing results for " + displayName + " - " + (10 + (combinedSeed % 8)) + " entries";
    document.getElementById("header-action-label").innerText =
        pickFromArray(headerActionLabels, combinedSeed, 0);

    // Sort label
    document.getElementById("sort-label").innerText = pickFromArray(sortLabels, combinedSeed, 0);

    // Sidebar heading
    var sidebarH3 = pickFromArray(sidebarTitles, combinedSeed, 2)
        .replace("[QUERY]", displayName)
        .replace("[DOMAIN]", fullName);
    document.getElementById("sidebar-heading").innerText = sidebarH3;

    // Footer text + status (evergreen, tanpa tanggal)
    document.getElementById("footer-text").innerText =
        pickFromArray(footerTexts, combinedSeed, 3).replace("[DOMAIN]", fullName);
    document.getElementById("footer-status").innerText =
        pickFromArray(footerStatuses, combinedSeed, 50);

    /*
     * ============================================
     * STEP 12: KEYWORD POOL UNTUK INTERNAL LINK
     * ============================================
     */
    var platforms = shuffleArray([
        "OnlyFans", "TikTok", "Instagram", "Telegram", "Twitter",
        "Discord", "Snapchat", "Premium", "Patreon", "Twitch",
        "YouTube", "Facebook", "Reddit", "Threads"
    ], domainHash);

    var adjectives = shuffleArray([
        "private", "exclusive", "premium", "deleted", "hidden",
        "rare", "viral", "secret", "unreleased", "censored",
        "archived", "restricted", "special", "limited"
    ], domainHash);

    var contentTypes = shuffleArray([
        "videos", "photos", "media", "content", "collection",
        "archive", "pack", "set", "gallery", "clips",
        "stories", "posts", "footage", "files", "data"
    ], domainHash);

    var leakTerms = shuffleArray([
        "leaked", "leak", "leaks", "exclusive", "private",
        "premium", "full", "mega", "rare"
    ], domainHash);

    function generateQueryKW(seed, count) {
        var keywords = [];
        for (var i = 0; i < count; i++) {
            var parts = [];
            parts.push(pickFromArray(platforms, seed, i));
            parts.push(pickFromArray(adjectives, seed, i + 5));
            parts.push(pickFromArray(contentTypes, seed, i + 10));
            parts.push(pickFromArray(leakTerms, seed, i + 15));
            keywords.push(parts.join(" ").toLowerCase());
        }
        return keywords;
    }

    function generatePostTitle(seed, index, name) {
        var patterns = shuffleArray([
            "[F1] " + name + " Collection - Full Set",
            "[F2] " + name + " Archive - Complete",
            name + " - [F1] Content Update",
            "[F3] " + name + " - Latest Entry",
            name + " [F4] Collection",
            "[F1] " + name + " - [F2] Edition",
            name + " Archive - [F3] Release",
            "[F5] " + name + " - All Files"
        ], seed);
        return pickFromArray(patterns, seed, index);
    }

    /*
     * ============================================
     * STEP 13: GENERATE POSTS
     * ============================================
     */
    var postCount = 10 + (combinedSeed % 8);
    var postKws = generateQueryKW(combinedSeed, postCount);
    var postsHtml = "";

    for (var p = 0; p < postCount; p++) {
        var postSeed = combinedSeed + p * 777;
        var upvotes = Math.floor(300 + (new SeededRandom(postSeed).next() * 4700));
        var commentCount = Math.floor(upvotes / (5 + (postSeed % 5)));
        var timeAgo = pickFromArray(timePhrases, postSeed, p);
        var authorPrefix = pickFromArray(authorPrefixes, postSeed, p);
        var authorNum = Math.floor(new SeededRandom(postSeed + 100).next() * 9000) + 1000;

        var f1 = pickFromArray(flairPool, postSeed, 0);
        var f2 = pickFromArray(flairPool, postSeed, 7);
        var f3 = pickFromArray(flairPool, postSeed, 14);
        var f4 = pickFromArray(flairPool, postSeed, 3);
        var f5 = pickFromArray(flairPool, postSeed, 10);

        var rawTitle = generatePostTitle(postSeed, p, displayName);
        rawTitle = rawTitle.replace("[F1]", f1).replace("[F2]", f2)
                           .replace("[F3]", f3).replace("[F4]", f4).replace("[F5]", f5);

        var linkQuery = displayLower + " " + postKws[p];
        var actionSet = pickFromArray(actionVerbSets, postSeed, p);

        var flairClass1 = "flair-" + ((p % 5) + 1);
        var flairClass2 = "flair-" + (((p + 2) % 5) + 1);

        postsHtml += "<div class=\"post-card\">";
        postsHtml += "<div class=\"post-card-header\">";
        postsHtml += "<span class=\"post-card-community\">" + fullName + "</span>";
        postsHtml += "<span class=\"post-card-author\">" + authorPrefix + "_" + authorNum + "</span>";
        postsHtml += "<span class=\"post-card-time\">- " + timeAgo + "</span>";
        postsHtml += "</div>";
        postsHtml += "<div class=\"post-card-title\"><a href=\"/?q=" + encodeURIComponent(linkQuery) + "\">" + rawTitle + "</a></div>";
        postsHtml += "<div class=\"post-card-meta\">";
        postsHtml += "<span class=\"flair " + flairClass1 + "\">" + f1 + "</span>";
        postsHtml += "<span class=\"flair " + flairClass2 + "\">" + f2 + "</span>";
        postsHtml += "</div>";
        postsHtml += "<div class=\"vote-section\"><button class=\"vote-btn\">Up</button> " + upvotes.toLocaleString() + " <button class=\"vote-btn\">Down</button></div>";
        postsHtml += "<div class=\"action-row\">";
        postsHtml += "<a href=\"/?q=" + encodeURIComponent(linkQuery) + "\" class=\"action-link\">" + commentCount + " " + actionSet[0] + "</a>";
        postsHtml += "<a href=\"/?q=" + encodeURIComponent(linkQuery) + "\" class=\"action-link\">" + actionSet[1] + "</a>";
        postsHtml += "<a href=\"/?q=" + encodeURIComponent(linkQuery) + "\" class=\"action-link\">" + actionSet[2] + "</a>";
        postsHtml += "</div>";
        postsHtml += "</div>";
    }

    document.getElementById("post-feed").innerHTML = postsHtml;
    document.getElementById("post-feed").classList.add(layoutClass);

    /*
     * ============================================
     * STEP 14: SIDEBAR LINKS
     * ============================================
     */
    var sidebarCount = 10 + (combinedSeed % 8);
    var sidebarKws = generateQueryKW(combinedSeed + 3333, sidebarCount);
    var sidebarHtml = "";
    for (var s = 0; s < sidebarCount; s++) {
        var skw = sidebarKws[s];
        var label = skw.split(" ").map(function(w) {
            return w.charAt(0).toUpperCase() + w.slice(1);
        }).join(" ");
        sidebarHtml += "<div class=\"sidebar-item\"><a href=\"/?q=" + encodeURIComponent(displayLower + " " + skw) + "\"><span class=\"sidebar-number\">" + (s+1) + ".</span> " + label + "</a></div>";
    }
    document.getElementById("sidebar-links").innerHTML = sidebarHtml;

    /*
     * ============================================
     * STEP 15: FOOTER LINKS
     * ============================================
     */
    var footerLinkCount = 5 + (combinedSeed % 5);
    var footerKws = generateQueryKW(combinedSeed + 7777, footerLinkCount);
    var footerLinksHtml = "";
    for (var f = 0; f < footerLinkCount; f++) {
        var fkw = footerKws[f];
        var flabel = fkw.split(" ").map(function(w) {
            return w.charAt(0).toUpperCase() + w.slice(1);
        }).join(" ");
        var flinkQuery = displayLower + " " + fkw;
        footerLinksHtml += "<a href=\"/?q=" + encodeURIComponent(flinkQuery) + "\">" + flabel + "</a>";
    }
    document.getElementById("footer-links").innerHTML = footerLinksHtml;

    /*
     * ============================================
     * STEP 16: CANONICAL FINAL
     * ============================================
     */
    var canonicalLink = document.getElementById("dynamic-canonical");
    if (canonicalLink) {
        canonicalLink.setAttribute("href", location.href);
    }

})();
</script>

{% include footer.html %}

</div>
</body>
</html>
